<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sphere TD Code Export Reader + Editor</title>

<script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>

<style>
:root{
  --bg1:#0f172a;
  --bg2:#1e293b;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --accent:#2563eb;
  --accent2:#1d4ed8;
  --border:#e2e8f0;
}

*{ box-sizing:border-box; }

body{
  margin:0;
  padding:24px;
  font-family:Inter,Arial,sans-serif;
  background:linear-gradient(135deg,var(--bg1),var(--bg2));
  min-height:100vh;
}

.wrapper{
  max-width:1100px;
  margin:auto;
}

.card{
  background:#fff;
  border-radius:22px;
  padding:28px;
  box-shadow:0 20px 60px rgba(0,0,0,.25);
}

h1{
  margin:0 0 10px;
  font-size:30px;
}

.desc{
  color:var(--muted);
  margin-bottom:18px;
}

.tabs{
  display:flex;
  gap:10px;
  margin-bottom:18px;
}

.tab-btn{
  border:none;
  padding:10px 16px;
  border-radius:12px;
  cursor:pointer;
  font-weight:700;
  background:#e2e8f0;
}

.tab-btn.active{
  background:var(--accent);
  color:#fff;
}

.tab{
  display:none;
}

.tab.active{
  display:block;
}

textarea{
  width:100%;
  min-height:220px;
  resize:vertical;
  border:1px solid var(--border);
  border-radius:16px;
  padding:16px;
  font-size:14px;
  font-family:Consolas,monospace;
}

textarea:focus{
  outline:none;
  border-color:var(--accent);
  box-shadow:0 0 0 4px rgba(37,99,235,.12);
}

.controls{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:14px;
}

button{
  border:none;
  padding:12px 18px;
  border-radius:14px;
  font-size:14px;
  font-weight:700;
  cursor:pointer;
}

.primary{
  background:var(--accent);
  color:#fff;
}

.primary:hover{
  background:var(--accent2);
}

.secondary{
  background:#eef2ff;
}

.ghost{
  background:#f1f5f9;
}

.status{
  margin-top:14px;
  color:var(--muted);
}

pre{
  margin-top:16px;
  background:#0f172a;
  color:#e2e8f0;
  padding:18px;
  border-radius:16px;
  white-space:pre-wrap;
  word-break:break-word;
  min-height:140px;
}

.footer{
  margin-top:18px;
  font-size:13px;
  color:#94a3b8;
}
</style>
</head>

<body>
<div class="wrapper">
<div class="card">

<h1>Sphere TD Code Reader + Editor</h1>
<p class="desc">
Decode build codes, edit decrypted content, then re-encrypt into a new export string.
</p>

<div class="tabs">
  <button class="tab-btn active" onclick="openTab('decode',this)">Decode</button>
  <button class="tab-btn" onclick="openTab('edit',this)">Edit / Reencrypt</button>
</div>

<!-- DECODE TAB -->
<div class="tab active" id="decodeTab">

<textarea id="input" placeholder="Paste encoded export string here..."></textarea>

<div class="controls">
  <button class="primary" onclick="decodeData()">Decode</button>
  <button class="secondary" onclick="pasteClipboard()">Paste</button>
  <button class="ghost" onclick="clearAll()">Clear</button>
</div>

<div class="status" id="status"></div>

<pre id="output"></pre>

</div>

<!-- EDIT TAB -->
<div class="tab" id="editTab">

<textarea id="editor" placeholder="Decoded text appears here. Edit it, then reencrypt..."></textarea>

<div class="controls">
  <button class="primary" onclick="reencrypt()">Reencrypt</button>
  <button class="secondary" onclick="copyResult()">Copy Result</button>
</div>

<div class="status" id="editStatus"></div>

<pre id="encryptedOutput"></pre>

</div>

<div class="footer">
Runs fully in your browser. No upload required.
</div>

</div>
</div>

<script>
function openTab(name,btn){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));

  if(name==="decode"){
    document.getElementById("decodeTab").classList.add("active");
  }else{
    document.getElementById("editTab").classList.add("active");
  }

  btn.classList.add("active");
}

function b64ToUint8Array(b64){
  const binary = atob(b64.trim());
  const bytes = new Uint8Array(binary.length);

  for(let i=0;i<binary.length;i++){
    bytes[i]=binary.charCodeAt(i);
  }
  return bytes;
}

function uint8ToBase64(bytes){
  let binary="";
  for(let i=0;i<bytes.length;i++){
    binary += String.fromCharCode(bytes[i]);
  }
  return btoa(binary);
}

function decodeData(){
  const input=document.getElementById("input").value.trim();
  const output=document.getElementById("output");
  const status=document.getElementById("status");

  output.textContent="";
  status.textContent="";

  if(!input){
    status.textContent="Please enter a code.";
    return;
  }

  try{
    const compressed=b64ToUint8Array(input);
    const decompressed=pako.ungzip(compressed,{to:"string"});

    let shown=decompressed;

    try{
      shown=JSON.stringify(JSON.parse(decompressed),null,2);
    }catch(e){}

    output.textContent=shown;
    document.getElementById("editor").value=shown;

    status.textContent="Decoded successfully.";
  }
  catch(err){
    status.textContent="Decode failed.";
    output.textContent="Error: "+err.message;
  }
}

function reencrypt(){
  const text=document.getElementById("editor").value;
  const out=document.getElementById("encryptedOutput");
  const status=document.getElementById("editStatus");

  out.textContent="";
  status.textContent="";

  if(!text.trim()){
    status.textContent="Nothing to encrypt.";
    return;
  }

  try{
    let finalText=text;

    try{
      finalText = JSON.stringify(JSON.parse(text));
    }catch(e){}

    const compressed=pako.gzip(finalText);
    const encoded=uint8ToBase64(compressed);

    out.textContent=encoded;
    status.textContent="Reencrypted successfully.";
  }
  catch(err){
    status.textContent="Encryption failed.";
    out.textContent="Error: "+err.message;
  }
}

async function pasteClipboard(){
  try{
    const text=await navigator.clipboard.readText();
    document.getElementById("input").value=text;
    document.getElementById("status").textContent="Clipboard pasted.";
  }catch(err){
    document.getElementById("status").textContent="Clipboard blocked.";
  }
}

async function copyResult(){
  const text=document.getElementById("encryptedOutput").textContent;

  if(!text.trim()) return;

  try{
    await navigator.clipboard.writeText(text);
    document.getElementById("editStatus").textContent="Encrypted code copied.";
  }catch(err){
    document.getElementById("editStatus").textContent="Copy failed.";
  }
}

function clearAll(){
  document.getElementById("input").value="";
  document.getElementById("output").textContent="";
  document.getElementById("status").textContent="";
  document.getElementById("editor").value="";
  document.getElementById("encryptedOutput").textContent="";
  document.getElementById("editStatus").textContent="";
}
</script>

</body>
</html>
